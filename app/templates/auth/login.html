<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>

    {% if request.query_params.get("cadastro") == ok %}
        <p style="color: rgb(17, 145, 17);">Cadastro realizado! Faça login</p>

    <form action="/auth/login" method="post">
        Email: <input type="email" name="email" required>
        <br>
        Senha: <input type="password" name="senha">
        <br>
        <br>
        <button type="submit">Entrar</button>

        {% if erro %}
            <p style="color: red;">{{erro}}</p>
        {% endif %}
    </form>

    <p>Não tem conta?<a href="/auth/cadastro">Cadastre-se</a></p>
</body>
</html>
